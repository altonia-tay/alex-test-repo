name: Alex Auto-Fix

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
  pull_request:
    branches:
      - feat/alex-*
    types:
      - opened
      - synchronize

jobs:
  auto-fix-from-workflow:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'feat/alex-test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.ALEX_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pyright

      - name: Run Ruff and auto-fix
        run: |
          ruff check . --fix || true
          ruff format . || true

      - name: Run Black
        run: |
          black . || true

      - name: Commit and push fixes
        run: |
          git config --global user.name "Alex Bot"
          git config --global user.email "alex-bot@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix: Auto-fix linting issues [Alex Bot]"
            git push
          else
            echo "No fixes to apply"
          fi

  auto-fix-from-pr:
    if: |
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.ALEX_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pyright

      - name: Run Ruff and auto-fix
        run: |
          ruff check . --fix || true
          ruff format . || true

      - name: Run Black
        run: |
          black . || true

      - name: Commit and push fixes
        run: |
          git config --global user.name "Alex Bot"
          git config --global user.email "alex-bot@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix: Auto-fix linting issues [Alex Bot]"
            git push
          else
            echo "No fixes to apply"
          fi
