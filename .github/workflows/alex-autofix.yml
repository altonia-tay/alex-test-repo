name: Alex Auto-Fix

on:
  pull_request:
    branches:
      - feat/alex-*
    types:
      - opened
      - synchronize
      - reopened

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.ALEX_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run Ruff auto-fix
        run: |
          ruff check . --fix

      - name: Run Black
        run: |
          black .

      - name: Commit and push fixes
        run: |
          git config --global user.name "Alex Bot"
          git config --global user.email "alex-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "fix: Auto-fix linting issues [Alex Bot]" && git push)
