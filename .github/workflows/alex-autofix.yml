name: Alex Auto-Fix

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed

jobs:
  auto-fix:
    if: |
      github.event.check_suite.conclusion == 'failure' &&
      github.event.check_suite.head_branch == 'feat/alex-test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_suite.head_branch }}
          token: ${{ secrets.ALEX_BOT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          pip install ruff black

      - name: Run Ruff auto-fix
        run: |
          ruff check --fix . || true
          ruff format .

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push fixes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "alex-bot@users.noreply.github.com"
          git config --local user.name "Alex Bot"
          git add -A
          git commit -m "fix: Auto-fix lint errors [Alex Bot]"
          git push
